version: '2'
sql:
  - engine: 'postgresql'
    queries: 'infrastructure/db/queries/'
    schema: 'infrastructure/db/migrations/'
    gen:
      go:
        package: 'db'
        out: 'infrastructure/db/sqlc'
        sql_package: 'pgx/v5'
        emit_json_tags: true
        emit_db_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_empty_slices: true
