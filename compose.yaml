services:
  postgres:
    image: postgres:18-alpine
    container_name: kerabu_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kerabu
    volumes:
      - kerabu_pg_data:/var/lib/postgresql

volumes:
  kerabu_pg_data:
